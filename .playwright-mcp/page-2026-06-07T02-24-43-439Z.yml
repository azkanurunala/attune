            - heading "Practical example#" [level=3] [ref=e433]:
              - text: Practical example
              - link "#" [ref=e434] [cursor=pointer]:
                - /url: "#practical-example"
            - paragraph [ref=e435]:
              - text: Your project contains sensitive and important information in a
              - code [ref=e436]: config/
              - text: "directory. You can:"
            - list [ref=e437]:
              - listitem [ref=e438]:
                - text: Assign ownership of the directory. To do this, set up a
                - code [ref=e439]: CODEOWNERS
                - text: file.
              - listitem [ref=e440]:
                - text: Create a protected branch for your default branch. For example,
                - code [ref=e441]: main
                - text: .
              - listitem [ref=e442]:
                - text: Enable
                - strong [ref=e443]: Required approval from code owners
                - text: on the protected branch.
              - listitem [ref=e444]:
                - text: Optional. Edit the
                - code [ref=e445]: CODEOWNERS
                - text: file to add a rule for multiple approvals.
            - paragraph [ref=e446]:
              - text: With this configuration, merge requests that change files in the
              - code [ref=e447]: config/
              - text: directory and target the
              - code [ref=e448]: main
              - text: branch require approval from the designated Code Owners before merging.
            - heading "Allowed to push and merge to a protected branch#" [level=3] [ref=e449]:
              - text: Allowed to push and merge to a protected branch
              - link "#" [ref=e450] [cursor=pointer]:
                - /url: "#allowed-to-push-and-merge-to-a-protected-branch"
            - paragraph [ref=e451]:
              - text: Users who are
              - strong [ref=e452]: Allowed to push and merge
              - text: can choose to create a merge request for their changes, or push the changes directly to a branch. If the user skips the merge request process, the protected branch features and Code Owner approvals built into merge requests are also skipped.
            - paragraph [ref=e453]:
              - text: This permission is often granted to accounts associated with automation (
              - link "internal users" [ref=e454] [cursor=pointer]:
                - /url: /administration/internal_users/
              - text: ) and release tooling.
            - paragraph [ref=e455]:
              - text: All changes from users without the
              - strong [ref=e456]: Allowed to push
              - text: permission must be routed through a merge request.

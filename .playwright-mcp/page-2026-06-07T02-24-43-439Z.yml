              - link "#" [ref=e419] [cursor=pointer]:
                - /url: "#code-owners-and-protected-branches"
            - paragraph [ref=e420]:
              - text: To ensure merge request changes are reviewed and approved by Code Owners, specified in the
              - link "CODEOWNERS file" [ref=e421] [cursor=pointer]:
                - /url: /user/project/codeowners/#codeowners-file
                - code [ref=e422]: CODEOWNERS
                - text: file
              - text: ", the merge request’s target branch must be"

            - paragraph [ref=e491]:
              - text: The
              - code [ref=e492]: CODEOWNERS
              - text: "file defines who is responsible for code in a GitLab project. Its purpose is to:"
            - list [ref=e493]:
              - listitem [ref=e494]: Define Code Owners for specific files and directories.
              - listitem [ref=e495]: Enforce approval requirements for protected branches.
              - listitem [ref=e496]: Communicate code ownership in a project.
            - paragraph [ref=e497]: This file determines who should review and approve changes and ensures the right experts are involved in code changes.
            - paragraph [ref=e498]:

              - text: and
              - link "Code Owner approval" [ref=e424] [cursor=pointer]:
                - /url: /user/project/repository/branches/protected/#require-code-owner-approval
              - text: must be enabled.
            - paragraph [ref=e425]: "The following features are available when you enable Code Owner approvals on protected branches:"
            - list [ref=e426]:
              - listitem [ref=e427]:
                - link "Require approvals from Code Owners" [ref=e428] [cursor=pointer]:

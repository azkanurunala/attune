            - heading "Approval rule name can’t be blank#" [level=3] [ref=e859]:
              - text: Approval rule name can’t be blank
              - link "#" [ref=e860] [cursor=pointer]:
                - /url: "#approval-rule-name-cant-be-blank"
            - paragraph [ref=e861]: As a workaround for this validation error, you can delete the approval rule through the API.
            - list [ref=e862]:
              - listitem [ref=e863]:
                - link "List all approval rules for the project" [ref=e864] [cursor=pointer]:

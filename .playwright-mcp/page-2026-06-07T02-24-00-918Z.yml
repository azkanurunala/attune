                - text: .
            - paragraph [ref=e867]:
              - text: For more information about this validation error, read
              - link "issue 285129" [ref=e868] [cursor=pointer]:
                - /url: https://gitlab.com/gitlab-org/gitlab/-/issues/285129
              - text: .
            - heading "Groups need explicit or inherited Developer role on a project#" [level=3] [ref=e869]:
              - text: Groups need explicit or inherited Developer role on a project
              - link "#" [ref=e870] [cursor=pointer]:
                - /url: "#groups-need-explicit-or-inherited-developer-role-on-a-project"
            - paragraph [ref=e871]: A group created to handle approvals may be created in a different area of the project hierarchy than the project requiring review. If this happens, members of the group may not have permission to approve the merge request as they do not have access to it.
            - paragraph [ref=e872]: "For example:"
            - paragraph [ref=e873]: In the group structure below, project 1 belongs to subgroup 1 and subgroup 4 has users.
            - paragraph [ref=e874]:
              - link "Example scenario - project and group hierarchy" [ref=e875] [cursor=pointer]:
                - /url: /user/project/merge_requests/approvals/img/group_access_example_01_v16_8.png
                - img "Example scenario - project and group hierarchy" [ref=e876]
            - paragraph [ref=e877]:
              - text: Project 1 has configured an approval rule for the project, which assigns subgroup 4 as approvers. When a merge request is created, approvers from subgroup 4 appear in the eligible approvers list. However, as users from subgroup 4 do not have permission to view the merge request, the
              - code [ref=e878]: "404"
              - text: error is returned. To grant membership, the group must be invited as a project member. It is now possible for users from subgroup 4 to approve.
            - paragraph [ref=e879]:
              - link "Project members page showing subgroup 4 as a member" [ref=e880] [cursor=pointer]:
                - /url: /user/project/merge_requests/approvals/img/group_access_example_02_v16_8.png
                - img "Project members page showing subgroup 4 as a member" [ref=e881]

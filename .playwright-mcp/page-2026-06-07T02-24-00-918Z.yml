                - /url: "#enable-approval-permissions-for-additional-users"
            - paragraph [ref=e585]: Before users with the Planner or Reporter role can merge to a protected branch, you have to grant them permission to approve merge requests. Some users (like managers) might not need permission to push or merge code, but still need oversight on proposed work.
            - paragraph [ref=e586]:
              - text: Users with the Planner or Reporter role can approve merge requests only through regular approval rules. Code owner approval rules require users to have the Developer, Maintainer, or Owner role. For more information, see
              - link "eligible approvers" [ref=e587] [cursor=pointer]:
                - /url: /user/project/merge_requests/approvals/rules/#eligible-approvers
              - text: .
            - paragraph [ref=e588]: "Prerequisites:"

            - heading "Security Approvals#" [level=2] [ref=e621]:
              - text: Security Approvals
              - link "#" [ref=e622] [cursor=pointer]:
                - /url: "#security-approvals"
            - list [ref=e624]:
              - listitem [ref=e625]: "Tier: Ultimate"
              - listitem [ref=e626]: "Offering: GitLab.com, GitLab Self-Managed, GitLab Dedicated"
            - button "Toggle section" [ref=e628] [cursor=pointer]: History
            - paragraph [ref=e630]:
              - text: You can use
              - link "merge request approval policies" [ref=e631] [cursor=pointer]:
                - /url: /user/application_security/policies/merge_request_approval_policies/#merge-request-approval-policy-editor
              - text: to define security approvals based on the status of vulnerabilities in the merge request and the default branch. Details for each security policy is shown in the Security Approvals section of your Merge Request configuration.
            - paragraph [ref=e632]: The security approval rules are applied to all merge requests until the pipeline is complete. The application of the security approval rules prevents users from merging in code before the security scans run. After the pipeline is complete, the security approval rules are checked to determine if the security approvals are still required. In case the scanners in the pipeline identify an issue and security approvals are required, a bot comment is generated on the merge request to indicate which steps are needed to proceed.
            - paragraph [ref=e633]:
              - link "The Security Approvals section displaying a policy rule that requires one approval when a scanner finds vulnerabilities." [ref=e634] [cursor=pointer]:
                - /url: /user/project/merge_requests/approvals/img/security_approvals_v15_0.png
                - img "The Security Approvals section displaying a policy rule that requires one approval when a scanner finds vulnerabilities." [ref=e635]
            - paragraph [ref=e636]:
              - text: These policies are both created and edited in the
              - link "security policy editor" [ref=e637] [cursor=pointer]:

              - link "#" [ref=e839] [cursor=pointer]:
                - /url: "#group-approvers"
            - paragraph [ref=e840]: You can add a group of users as approvers. All direct members of this group can approve the rule. Inherited members cannot approve the rule.
            - paragraph [ref=e841]: "Typically the group is a subgroup in your top-level namespace, unless you are collaborating with an external group. If you are collaborating with another group and want to use members of that group as approvers, you can either:"
            - list [ref=e842]:
              - listitem [ref=e843]:
                - link "Share access to the project" [ref=e844] [cursor=pointer]:
                  - /url: /user/project/members/sharing_projects_groups/#sharing-projects
                - text: .
              - listitem [ref=e845]:
                - link "Share access to your project’s group" [ref=e846] [cursor=pointer]:
                  - /url: /user/project/members/sharing_projects_groups/#sharing-groups
                - text: ", which gives the external group approval access to all projects in your project’s group."
            - paragraph [ref=e847]: "A user’s membership in an approver group determines their individual approval permissions in the following ways:"
            - list [ref=e848]:
              - listitem [ref=e849]: Inherited members are not considered approvers. Only direct members can approve merge requests.
              - listitem [ref=e850]: A user from a group approver group who is later also added as an individual approver counts as one approver, not two.
              - listitem [ref=e851]:
                - text: Merge request authors do not count as eligible approvers on their own merge requests by default. To change this behavior, disable the
                - link "Prevent merge request creator approval" [ref=e852] [cursor=pointer]:
                  - /url: /user/project/merge_requests/approvals/settings/#prevent-approval-by-merge-request-creator
                  - strong [ref=e853]: Prevent merge request creator approval
                - text: project setting.
              - listitem [ref=e854]:
                - text: By default, committers to merge requests can approve a merge request. To change this behavior, enable the
                - link "Prevent committers approval" [ref=e855] [cursor=pointer]:
                  - /url: /user/project/merge_requests/approvals/settings/#prevent-approvals-by-users-who-add-commits
                  - strong [ref=e856]: Prevent committers approval
                - text: project setting.
